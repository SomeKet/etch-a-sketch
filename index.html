<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Etch-A-Sketch</title>
</head>
<body>
    <div class="gridMenu">
        <div class="colorMenu">
            <button type="click" style="background-color: black; color:aliceblue"class="color" id="btnBlack">Black</button>
            <button type="click" style="background-color:orangered"class="color" id="btnOrange">Orange</button>
            <button type="click" style="background-color: pink" id="btnPink">Pink</button>
            <button type="click" style="background-color: transparent" id="btnEraser">Eraser</button>
        </div>
        <form id="gridForm">
            <label for="columns">Anzal der Spalten</label>
            <input type="number" id="columns" name="columns" min="1" required>

            <label for="rows">Anzahl der Zeilen</label>
            <input type="number" id="rows" name="rows" min="1" required>

            <button type="submit">Create Grid</button>
        </form>
    </div>
    <div class="container" id="sixteenXsixteen"></div>
</body>
</html>
